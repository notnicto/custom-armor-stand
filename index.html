<!DOCTYPE html>
<html lang="en">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
      charset="UTF-8"
    />
    <title>Armor Stand Pack Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Armor Stand Pack</h1>

      <div class="pack-box">
        <input type="text" id="name" placeholder="Pack Name" />
      </div>
      <div class="file-wrapper">
        <input type="file" id="packIconInput" accept="image/png" />
        <div class="file-button" id="packIconBtn">
          Upload Pack Icon (1024x1024)
        </div>
      </div>
      <h3>Upload Armor Stand Skins</h3>

      <div id="textureContainer"></div>
      <button type="button" id="addTextureBtn">Add more skins</button>

      <button onclick="generate()">Download pack</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
